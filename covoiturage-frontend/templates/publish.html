{% extends 'base.html' %}
{% block content %}
<style>
.pub-wrap{min-height:calc(100vh - 60px);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px 60px;background:var(--bg);}
.pub-card{background:white;border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh-lg);width:100%;max-width:620px;overflow:hidden;}
.pub-top{background:var(--ink);padding:30px 32px 28px;position:relative;overflow:hidden;}
.pub-top::before{content:'';position:absolute;top:-50px;right:-50px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(0,82,255,0.25) 0%,transparent 70%);}
.pub-top h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:white;letter-spacing:-0.3px;margin-bottom:4px;position:relative;}
.pub-top p{font-size:13px;color:rgba(255,255,255,0.45);position:relative;}
.pub-body{padding:28px 32px 32px;}
.pub-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.pub-group{margin-bottom:14px;}

/* Section headers */
.pub-sec{display:flex;align-items:center;gap:8px;margin:20px 0 14px;padding-top:20px;border-top:1px solid var(--border);}
.pub-sec:first-of-type{margin-top:0;padding-top:0;border-top:none;}
.pub-sec-icon{width:28px;height:28px;border-radius:8px;background:var(--blue-lt);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pub-sec-icon i{font-size:12px;color:var(--blue);}
.pub-sec-lbl{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:0.8px;}

/* Submit */
.pub-submit{margin-top:24px;}
.pub-submit button{width:100%;background:var(--blue);color:white;border:none;border-radius:var(--rsm);padding:13px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.15s;box-shadow:0 2px 8px rgba(0,82,255,0.28);}
.pub-submit button:hover{background:var(--blue-dk);transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,82,255,0.38);}

/* Loading state for selects */
.fld-loading{color:var(--ink4)!important;}

@media(max-width:600px){
  .pub-row{grid-template-columns:1fr;}
  .pub-body{padding:20px 20px 24px;}
  .pub-top{padding:24px 20px 20px;}
}
</style>

<div class="pub-wrap">
  <div class="pub-card">
    <div class="pub-top">
      <h1>Publier un trajet</h1>
      <p>Partagez votre voyage et économisez sur vos frais</p>
    </div>
    <div class="pub-body">
      <form method="post">
        {% csrf_token %}

        <!-- Itinéraire -->
        <div class="pub-sec">
          <div class="pub-sec-icon"><i class="fas fa-route"></i></div>
          <div class="pub-sec-lbl">Itinéraire</div>
        </div>
        <div class="pub-row">
          <div>
            <label class="fld-lbl">Ville de départ</label>
            <select name="departure" class="fld" id="departure" required>
              <option value="">Chargement...</option>
            </select>
          </div>
          <div>
            <label class="fld-lbl">Ville d'arrivée</label>
            <select name="destination" class="fld" id="destination" required>
              <option value="">Chargement...</option>
            </select>
          </div>
        </div>

        <!-- Date & Heure -->
        <div class="pub-sec">
          <div class="pub-sec-icon"><i class="fas fa-calendar-alt"></i></div>
          <div class="pub-sec-lbl">Date et heure</div>
        </div>
        <div class="pub-row">
          <div>
            <label class="fld-lbl">Date de départ</label>
            <input type="date" name="departure_date" class="fld" required>
          </div>
          <div>
            <label class="fld-lbl">Heure de départ</label>
            <input type="time" name="departure_time" class="fld" required>
          </div>
        </div>

        <!-- Places & Prix -->
        <div class="pub-sec">
          <div class="pub-sec-icon"><i class="fas fa-users"></i></div>
          <div class="pub-sec-lbl">Places et tarif</div>
        </div>
        <div class="pub-row">
          <div>
            <label class="fld-lbl">Places disponibles</label>
            <input type="number" name="available_seats" class="fld" min="1" max="4" placeholder="Ex : 3" required>
          </div>
          <div>
            <label class="fld-lbl">Prix par place (DA)</label>
            <input type="number" name="price_per_seat" class="fld" min="100" step="100" placeholder="Ex : 500" required>
          </div>
        </div>

        <!-- Description -->
        <div class="pub-sec">
          <div class="pub-sec-icon"><i class="fas fa-comment-alt"></i></div>
          <div class="pub-sec-lbl">Description (optionnel)</div>
        </div>
        <div class="pub-group">
          <textarea name="description" class="fld" rows="3" style="resize:vertical;" placeholder="Informations utiles pour les passagers..."></textarea>
        </div>

        <div class="pub-submit">
          <button type="submit">Publier le trajet</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
fetch('/api/cities/')
  .then(r=>r.json())
  .then(data=>{
    const dep=document.getElementById('departure');
    const dest=document.getElementById('destination');
    let opts='<option value="">Sélectionnez une ville</option>';
    data.forEach(c=>{opts+=`<option value="${c.id}">${c.name_fr}</option>`;});
    dep.innerHTML=opts;
    dest.innerHTML=opts;
  })
  .catch(err=>{
    console.error('Erreur:',err);
    document.getElementById('departure').innerHTML='<option value="">Erreur de chargement</option>';
    document.getElementById('destination').innerHTML='<option value="">Erreur de chargement</option>';
  });
</script>
{% endblock %}
