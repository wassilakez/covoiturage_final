version: '3.8'

services:
  search-service:
    build: .
    container_name: search-service
    ports:
      - "8003:8003"
    environment:
      DB_NAME: trajet_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: host.docker.internal
      DB_PORT: 5432
    volumes:
      - .:/app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.search.rule=Host(`localhost`) && PathPrefix(`/api/search/`)"
      - "traefik.http.services.search.loadbalancer.server.port=8003"
      - "consul.service.name=search-service"
      - "consul.service.port=8003"
      - "consul.service.tags=django,search"