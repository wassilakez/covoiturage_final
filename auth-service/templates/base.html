<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caravan – Covoiturage Algérie</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --teal-dark: #0F4C5C;
            --teal-medium: #1A6B7A;
            --amber: #F4A261;
            --amber-dark: #E2893C;
            --gray-bg: #F8F9FA;
            --blue-primary: #2563EB;
            --blue-dark: #1E40AF;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background-color: var(--gray-bg);
            font-family: 'Inter', sans-serif;
            color: #1E293B;
        }
        
        /* Navbar */
        .navbar {
            background-color: var(--teal-dark) !important;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 0.8rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar-brand {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.3px;
            color: white !important;
        }
        .nav-link {
            color: rgba(255,255,255,0.9) !important;
            transition: 0.2s;
        }
        .nav-link:hover {
            color: var(--amber) !important;
        }
        
        /* Buttons */
        .btn-outline-custom {
            border: 1px solid var(--amber);
            border-radius: 40px;
            padding: 6px 20px;
            background: transparent;
            color: var(--amber);
            transition: 0.2s;
            text-decoration: none;
        }
        .btn-outline-custom:hover {
            background: var(--amber);
            color: var(--teal-dark);
        }
        .btn-solid-custom {
            background: var(--amber);
            border: none;
            border-radius: 40px;
            padding: 6px 20px;
            color: var(--teal-dark);
            font-weight: 600;
            text-decoration: none;
        }
        .btn-solid-custom:hover {
            background: var(--amber-dark);
            color: white;
        }
        .btn-primary-custom {
            background: linear-gradient(135deg, var(--blue-primary), #3B82F6);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 700;
            width: 100%;
            color: white;
            transition: 0.3s;
        }
        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(37,99,235,0.3);
        }
        
        /* Auth Page */
        .auth-page {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .auth-glass {
            max-width: 1000px;
            width: 100%;
            display: flex;
            border-radius: 30px;
            overflow: hidden;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.2);
        }
        .auth-visual {
            flex: 1;
            padding: 50px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: linear-gradient(135deg, var(--teal-dark), var(--teal-medium));
        }
        .brand-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            margin-bottom: 30px;
        }
        .brand-badge i {
            font-size: 28px;
            color: var(--amber);
        }
        .auth-visual h1 {
            font-size: 38px;
            font-weight: 800;
            margin-bottom: 15px;
        }
        .auth-visual p {
            opacity: 0.9;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .floating-cards {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .mini-card {
            background: rgba(255,255,255,0.15);
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13px;
        }
        .auth-form {
            flex: 1;
            background: white;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .auth-form h2 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
        }
        .auth-form p {
            color: #64748B;
            margin-bottom: 25px;
        }
        .field {
            display: flex;
            align-items: center;
            background: #F1F5F9;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 15px;
            transition: 0.2s;
        }
        .field:focus-within {
            box-shadow: 0 0 0 2px var(--blue-primary);
            background: white;
        }
        .field i {
            margin-right: 12px;
            color: #64748B;
            width: 20px;
        }
        .field input, .field select {
            border: none;
            background: transparent;
            width: 100%;
            outline: none;
            font-size: 14px;
        }
        .divider {
            text-align: center;
            margin: 20px 0;
            color: #94A3B8;
            font-size: 13px;
        }
        .switch {
            text-align: center;
            font-size: 14px;
            margin-top: 20px;
        }
        .switch a {
            color: var(--blue-primary);
            font-weight: 600;
            text-decoration: none;
        }
        
        /* Profile */
        .profile-header {
            background: white;
            border-radius: 28px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .stat-card {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--teal-dark);
        }
        .trip-card {
            background: white;
            border-radius: 20px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }
        .trip-card:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .alert {
            border-radius: 16px;
            padding: 12px 20px;
        }
        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.8rem;
            color: #6C7A89;
            border-top: 1px solid #EDF2F7;
            margin-top: 2rem;
        }
        
        @media (max-width: 768px) {
            .auth-glass {
                flex-direction: column;
            }
            .auth-visual, .auth-form {
                padding: 30px;
            }
            .auth-visual h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="fas fa-car-side me-2"></i>Caravan
        </a>
        <div class="d-flex gap-3 align-items-center">
            <a href="/" class="nav-link">Accueil</a>
            <a href="/trips/" class="nav-link">Trajets</a>
            <div id="nav-buttons">
                <a href="/login/" class="btn-outline-custom">Connexion</a>
                <a href="/register/" class="btn-solid-custom ms-2">Inscription</a>
            </div>
        </div>
    </div>
</nav>

<div class="container py-4" style="min-height: 80vh;">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                <i class="fas fa-{% if message.tags == 'success' %}check-circle{% else %}exclamation-circle{% endif %} me-2"></i>
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</div>

<footer>
    <p><i class="fas fa-heart text-danger me-1"></i> Caravan – Mobilité partagée en Algérie</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_AUTH = 'http://localhost:8081/api/auth';
    const API_TRIPS = 'http://localhost:8082/api';
    const API_BOOKINGS = 'http://localhost:8083/api';
    
    document.addEventListener("DOMContentLoaded", function() {
        window.token = localStorage.getItem("access_token");
        if (window.token) {
            const navDiv = document.getElementById("nav-buttons");
            if (navDiv) {
                navDiv.innerHTML = `
                    <a href="/profile/" class="btn-outline-custom">Profil</a>
                    <a href="#" id="logoutBtn" class="btn-solid-custom ms-2">Déconnexion</a>
                `;
                document.getElementById("logoutBtn")?.addEventListener("click", (e) => {
                    e.preventDefault();
                    localStorage.removeItem("access_token");
                    localStorage.removeItem("user_id");
                    window.location.href = "/login/";
                });
            }
        }
    });
</script>
</body>
</html>
